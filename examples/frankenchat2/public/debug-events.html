<!DOCTYPE html>
<html>
    <head>
        <title>Event Debugger</title>
        <style>
            body {
                background: #111;
                color: #0f0;
                font-family: monospace;
                padding: 20px;
            }
            .evt {
                border-bottom: 1px solid #333;
                padding: 5px;
            }
        </style>
    </head>
    <body>
        <h3>Log des événements Bruts</h3>
        <div id="log"></div>
        <script>
            const log = (m) => document.getElementById('log').innerHTML = `<div class="evt">${new Date().toLocaleTimeString()} ${m}</div>` + document.getElementById('log').innerHTML;

            // Connexion
            const ws = new WebSocket('ws://' + location.host + '/app/frankenphp-key');

            ws.onopen = () => log("✅ TCP Connected");

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);

                // 1. Handshake reçu -> On s'abonne
                if (msg.event === 'pusher:connection_established') {
                    log("🚀 Sending Subscribe war-room...");
                    ws.send(JSON.stringify({
                        event: 'pusher:subscribe',
                        data: {
                            channel: 'presence-war-room',
                            auth: 'dummy',
                            channel_data: JSON.stringify({
                                user_id: {{ auth()->id() ?? 999 }},
                                user_info: {name: 'Spy Probe'}
                            })
                        }
                    }));
                }
                // 2. On affiche tout ce qu'on reçoit
                else {
                    log(`📩 <strong>${msg.event}</strong><br>${JSON.stringify(msg.data)}`);
                }
            };
        </script>
    </body>
</html>
