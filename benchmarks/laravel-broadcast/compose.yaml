name: laravel-broadcast-benchmark

x-laravel-env: &laravel-env
  APP_ENV: local
  APP_DEBUG: false
  APP_KEY: base64:6hY9DU+7hbHF3xzXDxN+RnwQ77CYH2xEqTtnYy/tKwM=
  AUTORUN_ENABLED: true
  AUTORUN_LARAVEL_MIGRATION: true
  AUTORUN_LARAVEL_MIGRATION_TIMEOUT: 60
  AUTORUN_LARAVEL_OPTIMIZE: true
  DB_CONNECTION: pgsql
  DB_PORT: 5432
  DB_DATABASE: benchmark
  DB_USERNAME: benchmark
  DB_PASSWORD: benchmark
  LOG_CHANNEL: stderr
  LOG_OUTPUT_LEVEL: warn
  PHP_OPCACHE_ENABLE: 1
  PHP_OPCACHE_VALIDATE_TIMESTAMPS: 0
  PHP_SESSION_COOKIE_SECURE: 0
  SHOW_WELCOME_MESSAGE: false
  SSL_MODE: off

services:
  postgres-pogo:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: benchmark
      POSTGRES_USER: benchmark
      POSTGRES_PASSWORD: benchmark
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchmark -d benchmark"]
      interval: 5s
      timeout: 5s
      retries: 12

  postgres-reverb:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: benchmark
      POSTGRES_USER: benchmark
      POSTGRES_PASSWORD: benchmark
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchmark -d benchmark"]
      interval: 5s
      timeout: 5s
      retries: 12

  pogo:
    build:
      context: ../..
      dockerfile: benchmarks/laravel-broadcast/Dockerfile
      args:
        APP_PATH: benchmarks/laravel-broadcast/pogo
    working_dir: /var/www/html
    command:
      [
        "php",
        "artisan",
        "octane:frankenphp",
        "--host=0.0.0.0",
        "--port=80",
        "--caddyfile=Caddyfile",
      ]
    environment:
      <<: *laravel-env
      BROADCAST_CONNECTION: pogo
      DB_HOST: postgres-pogo
      WS_APP_ID: pogo-app
      WS_APP_SECRET: super-secret-key
    ports:
      - "8081:80"
    depends_on:
      postgres-pogo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1/fire?count=0 >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  reverb-app:
    build:
      context: ../..
      dockerfile: benchmarks/laravel-broadcast/Dockerfile
      args:
        APP_PATH: benchmarks/laravel-broadcast/reverb
    working_dir: /var/www/html
    command:
      ["php", "artisan", "octane:frankenphp", "--host=0.0.0.0", "--port=8000"]
    environment:
      <<: *laravel-env
      BROADCAST_CONNECTION: reverb
      DB_HOST: postgres-reverb
      REVERB_APP_ID: reverb-app
      REVERB_APP_KEY: reverb-key
      REVERB_APP_SECRET: reverb-secret
      REVERB_HOST: reverb-ws
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    ports:
      - "8082:8000"
    depends_on:
      postgres-reverb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/fire?count=0 >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  reverb-ws:
    build:
      context: ../..
      dockerfile: benchmarks/laravel-broadcast/Dockerfile
      args:
        APP_PATH: benchmarks/laravel-broadcast/reverb
    working_dir: /var/www/html
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment:
      <<: *laravel-env
      AUTORUN_ENABLED: false
      BROADCAST_CONNECTION: reverb
      DB_HOST: postgres-reverb
      REVERB_APP_ID: reverb-app
      REVERB_APP_KEY: reverb-key
      REVERB_APP_SECRET: reverb-secret
      REVERB_HOST: reverb-ws
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    ports:
      - "8083:8080"
    healthcheck:
      disable: true
    depends_on:
      postgres-reverb:
        condition: service_healthy
      reverb-app:
        condition: service_healthy

  k6-pogo:
    image: grafana/k6
    command: ["run", "/scripts/benchmark.js"]
    environment:
      DRIVER: pogo
      HTTP_HOST: pogo
      WS_HOST: pogo
      HTTP_PORT: 80
      WS_PORT: 80
    volumes:
      - ./benchmark.js:/scripts/benchmark.js:ro
    depends_on:
      pogo:
        condition: service_healthy

  k6-reverb:
    image: grafana/k6
    command: ["run", "/scripts/benchmark.js"]
    environment:
      DRIVER: reverb
      HTTP_HOST: reverb-app
      WS_HOST: reverb-ws
      HTTP_PORT: 8000
      WS_PORT: 8080
    volumes:
      - ./benchmark.js:/scripts/benchmark.js:ro
    depends_on:
      reverb-app:
        condition: service_healthy
      reverb-ws:
        condition: service_started
