name: laravel-broadcast-benchmark

x-laravel-env: &laravel-env
  APP_KEY: base64:6hY9DU+7hbHF3xzXDxN+RnwQ77CYH2xEqTtnYy/tKwM=
  CACHE_STORE: array
  QUEUE_CONNECTION: sync
  SESSION_DRIVER: array

services:
  pogo:
    build:
      context: ../..
      dockerfile: benchmarks/laravel-broadcast/Dockerfile
      args:
        APP_PATH: benchmarks/laravel-broadcast/pogo
    working_dir: /var/www/html
    command:
      [
        "php",
        "artisan",
        "octane:frankenphp",
        "--host=0.0.0.0",
        "--port=8000",
        "--caddyfile=Caddyfile",
      ]
    environment:
      <<: *laravel-env
      BROADCAST_CONNECTION: pogo
      WS_APP_ID: pogo-app
      WS_APP_SECRET: super-secret-key
    ports:
      - "8081:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/fire?count=0 >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  reverb-app:
    build:
      context: ../..
      dockerfile: benchmarks/laravel-broadcast/Dockerfile
      args:
        APP_PATH: benchmarks/laravel-broadcast/reverb
    working_dir: /var/www/html
    command:
      ["php", "artisan", "octane:frankenphp", "--host=0.0.0.0", "--port=8000"]
    environment:
      <<: *laravel-env
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: reverb-app
      REVERB_APP_KEY: reverb-key
      REVERB_APP_SECRET: reverb-secret
      REVERB_HOST: reverb-ws
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    ports:
      - "8082:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/fire?count=0 >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  reverb-ws:
    build:
      context: ../..
      dockerfile: benchmarks/laravel-broadcast/Dockerfile
      args:
        APP_PATH: benchmarks/laravel-broadcast/reverb
    working_dir: /var/www/html
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    environment:
      <<: *laravel-env
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: reverb-app
      REVERB_APP_KEY: reverb-key
      REVERB_APP_SECRET: reverb-secret
      REVERB_HOST: reverb-ws
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    ports:
      - "8083:8080"
    healthcheck:
      disable: true
    depends_on:
      reverb-app:
        condition: service_healthy

  k6-pogo:
    image: grafana/k6
    command: ["run", "/scripts/benchmark.js"]
    environment:
      DRIVER: pogo
      HTTP_HOST: pogo
      WS_HOST: pogo
      HTTP_PORT: 8000
      WS_PORT: 8000
    volumes:
      - ./benchmark.js:/scripts/benchmark.js:ro
    depends_on:
      pogo:
        condition: service_healthy

  k6-reverb:
    image: grafana/k6
    command: ["run", "/scripts/benchmark.js"]
    environment:
      DRIVER: reverb
      HTTP_HOST: reverb-app
      WS_HOST: reverb-ws
      HTTP_PORT: 8000
      WS_PORT: 8080
    volumes:
      - ./benchmark.js:/scripts/benchmark.js:ro
    depends_on:
      reverb-app:
        condition: service_healthy
      reverb-ws:
        condition: service_started
