name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, iconv, ctype, xml, dom, fileinfo, tokenizer, filter
          tools: none
        env:
          phpts: ts

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev libargon2-dev libonig-dev libxml2-dev

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Extract Version Info
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          COMMIT=$(git rev-parse HEAD 2>/dev/null || echo none)
          echo "POGO_VERSION=$VERSION" >> $GITHUB_ENV
          echo "POGO_COMMIT=$COMMIT" >> $GITHUB_ENV
          echo "Version detected: $VERSION"

      - name: Configure CGO flags
        run: |
          echo "CGO_CFLAGS=-D_GNU_SOURCE $(php-config --includes)" >> $GITHUB_ENV
          echo "CGO_LDFLAGS=$(php-config --ldflags) $(php-config --libs)" >> $GITHUB_ENV

      - name: Run Go Tests
        run: go test -v -race ./pkg/...

      - name: Build Custom FrankenPHP
        env:
          XCADDY_GO_BUILD_FLAGS: "-ldflags='-w -s -X github.com/y-l-g/pogo.Version=${{ env.POGO_VERSION }} -X github.com/y-l-g/pogo.Commit=${{ env.POGO_COMMIT }}' -tags=nobadger,nomysql,nopgx,nowatcher"
        run: |
          xcaddy build \
            --output frankenphp-linux-x86_64 \
            --with github.com/y-l-g/pogo=. \
            --with github.com/dunglas/frankenphp/caddy \
            --with github.com/dunglas/caddy-cbrotli

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHP Tests via FrankenPHP
        run: ./frankenphp-linux-x86_64 php-cli ./vendor/bin/phpunit

      - name: Upload Binary as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frankenphp-binary
          path: frankenphp-linux-x86_64

  release:
    name: Create GitHub Release
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Binary
        uses: actions/download-artifact@v4
        with:
          name: frankenphp-binary

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: frankenphp-linux-x86_64
          draft: false
          prerelease: false
          generate_release_notes: true
